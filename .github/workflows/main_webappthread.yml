name: Build and deploy Node.js app to Azure Web App - webappthread

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        # สำคัญมาก: ต้องใส่บรรทัดนี้เพื่อให้ GitHub เข้าไปในโฟลเดอร์โปรเจกต์
        working-directory: ./threading-machine 
        run: |
          npm install
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # ระบุให้ส่งไฟล์จากในโฟลเดอร์ threading-machine ขึ้นไปเท่านั้น
          path: ./threading-machine

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          # อย่าลืมตรวจสอบว่าชื่อ Secret เหล่านี้ตรงกับใน GitHub Settings > Secrets ของคุณ
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D941D5EB58A54BA5B632766863071A27 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A9CB7F9F53234AF49B41716CD289CD43 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EF28A143920743EAB97B51D14BB52296 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webappthread'
          slot-name: 'Production'
          package: .
